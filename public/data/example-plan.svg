<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 707" font-family="'IBM Plex Mono', monospace">
  <!-- Plan paper -->
  <rect width="1000" height="707" fill="#F3F1EA"/>
  <rect x="8" y="8" width="984" height="691" fill="none" stroke="#1A1D1A" stroke-width="2"/>
  <rect x="20" y="20" width="960" height="667" fill="none" stroke="#1A1D1A" stroke-width="0.6"/>

  <!-- Faint survey grid -->
  <g stroke="#C9C4B6" stroke-width="0.5">
    <line x1="0" y1="100" x2="1000" y2="100"/><line x1="0" y1="200" x2="1000" y2="200"/>
    <line x1="0" y1="300" x2="1000" y2="300"/><line x1="0" y1="400" x2="1000" y2="400"/>
    <line x1="0" y1="500" x2="1000" y2="500"/><line x1="0" y1="600" x2="1000" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="707"/><line x1="200" y1="0" x2="200" y2="707"/>
    <line x1="300" y1="0" x2="300" y2="707"/><line x1="400" y1="0" x2="400" y2="707"/>
    <line x1="500" y1="0" x2="500" y2="707"/><line x1="600" y1="0" x2="600" y2="707"/>
    <line x1="700" y1="0" x2="700" y2="707"/><line x1="800" y1="0" x2="800" y2="707"/>
    <line x1="900" y1="0" x2="900" y2="707"/>
  </g>

  <!-- Title -->
  <text x="40" y="58" font-family="Archivo, sans-serif" font-size="26" font-weight="800" letter-spacing="3" fill="#1A1D1A">BEBAUUNGSPLAN "OBERE AU"</text>
  <text x="40" y="80" font-size="13" fill="#444">Stadt Bühl · Maßstab 1:1000 · EPSG:25832 · Blatt 1</text>

  <!-- Parcels / Baufenster sketch (left-centre) -->
  <g stroke="#1A1D1A" fill="none">
    <rect x="120" y="150" width="360" height="240" stroke-width="1.2" fill="#EDEAE2"/>
    <line x1="120" y1="230" x2="480" y2="230" stroke-dasharray="6 4"/>
    <line x1="300" y1="150" x2="300" y2="390" stroke-dasharray="6 4"/>
    <!-- Baufenster (buildable footprint) dashed red -->
    <rect x="190" y="200" width="120" height="90" stroke="#C2362B" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="196" y="252" font-size="11" fill="#C2362B" stroke="none">Baufenster</text>
  </g>
  <text x="120" y="420" font-size="12" fill="#1A1D1A" stroke="none">Flurstück 412/3 · Gemarkung Bühl</text>

  <!-- GRZ / GFZ / floors block (lower-left) -->
  <g>
    <rect x="120" y="455" width="300" height="160" fill="#FFFFFF" stroke="#1A1D1A" stroke-width="1"/>
    <text x="135" y="478" font-family="Archivo, sans-serif" font-size="11" letter-spacing="2" fill="#666">MASS DER BAULICHEN NUTZUNG</text>
    <line x1="120" y1="488" x2="420" y2="488" stroke="#C9C4B6"/>
    <text x="135" y="515" font-size="15" fill="#1A1D1A">GRZ &#160;&#160;&#160;0,4</text>
    <text x="135" y="552" font-size="15" fill="#1A1D1A">GFZ &#160;&#160;&#160;0,8</text>
    <text x="135" y="589" font-size="15" fill="#1A1D1A">Vollgeschosse &#160;&#160;II</text>
  </g>

  <!-- Nutzungsschablone (right) -->
  <g>
    <rect x="600" y="160" width="320" height="280" fill="#FFFFFF" stroke="#1A1D1A" stroke-width="1.4"/>
    <text x="618" y="190" font-family="Archivo, sans-serif" font-size="12" letter-spacing="2" fill="#666">NUTZUNGSSCHABLONE</text>
    <line x1="600" y1="200" x2="920" y2="200" stroke="#1A1D1A" stroke-width="0.8"/>

    <text x="618" y="232" font-size="16" fill="#1A1D1A">Firsthöhe (FH)</text>
    <text x="780" y="232" font-size="18" font-weight="600" fill="#1A1D1A">9,0 m</text>
    <line x1="600" y1="248" x2="920" y2="248" stroke="#C9C4B6"/>

    <text x="618" y="286" font-size="16" fill="#1A1D1A">Dachform</text>
    <text x="780" y="286" font-size="18" font-weight="600" fill="#1A1D1A">Satteldach</text>
    <line x1="600" y1="302" x2="920" y2="302" stroke="#C9C4B6"/>

    <text x="618" y="340" font-size="16" fill="#1A1D1A">Dachneigung (DN)</text>
    <text x="780" y="340" font-size="18" font-weight="600" fill="#1A1D1A">30–45°</text>
    <line x1="600" y1="356" x2="920" y2="356" stroke="#C9C4B6"/>

    <text x="618" y="394" font-size="13" fill="#555">Allgemeines Wohngebiet (WA)</text>
    <text x="618" y="416" font-size="13" fill="#555">offene Bauweise (o)</text>
  </g>

  <!-- North arrow -->
  <g transform="translate(930,540)">
    <path d="M0 -28 L8 8 L0 0 L-8 8 Z" fill="#1A1D1A"/>
    <text x="-4" y="26" font-size="12" fill="#1A1D1A">N</text>
  </g>

  <!-- Legend stamp -->
  <text x="600" y="630" font-size="11" fill="#888">Auszug — Demonstrationsplan, nicht rechtsverbindlich.</text>
</svg>
